<div th:fragment="product-form-fragment(formAction, heading, subheading, submitLabel, product, formIdPrefix)"
     class="create-product-page">

    <wa-card class="add-product-card">

        <form th:attr="hx-post=${formAction}"
              hx-target="#content"
              hx-swap="innerHTML"
              class="add-product-form">
            <div class="form-section-header">
                <h2 th:text="${heading}">Product Form</h2>
                <p th:text="${subheading}">Manage product details</p>
            </div>

            <wa-input name="title"
                      label="Title"
                      required
                      th:attr="value=${product != null ? product.title : ''}">
            </wa-input>

            <wa-input name="type"
                      label="Type"
                      th:attr="value=${product != null ? product.type : ''}">
            </wa-input>

            <div class="description-field-group">
                <wa-textarea name="description"
                             label="Description"
                             th:id="${formIdPrefix + 'DescriptionField'}"
                             th:text="${product != null and product.description != null ? product.description : ''}">
                </wa-textarea>

                <div class="description-field-actions">
                    <wa-button type="button"
                               variant="neutral"
                               th:id="${formIdPrefix + 'OpenAiDescriptionDialogBtn'}">
                        Generate description with AI
                    </wa-button>
                </div>
            </div>

            <wa-input name="imageUrl"
                      label="Image URL"
                      th:attr="value=${product != null ? product.imageUrl : ''}">
            </wa-input>

            <div class="add-product-actions">
                <wa-button type="submit" variant="brand" th:text="${submitLabel}">
                    Save
                </wa-button>
            </div>

        </form>

    </wa-card>

    <dialog th:id="${formIdPrefix + 'AiDescriptionDialog'}" class="ai-description-dialog">
        <form class="ai-description-dialog-form"
              hx-post="/product/description/generate"
              th:attr="hx-target=${'#' + formIdPrefix + 'AiDescriptionResult'}"
              hx-swap="innerHTML">
            <div class="ai-description-dialog-header">
                <div>
                    <h2>Generate product description</h2>
                    <p>Enter 1 to 5 rough keywords or short phrases.</p>
                </div>
                <button type="button"
                        class="ai-dialog-close-button"
                        th:id="${formIdPrefix + 'CloseAiDescriptionDialogBtn'}"
                        aria-label="Close dialog">
                    X
                </button>
            </div>

            <div class="ai-keyword-grid">
                <wa-input name="keyword1" label="Keyword 1" required></wa-input>
                <wa-input name="keyword2" label="Keyword 2"></wa-input>
                <wa-input name="keyword3" label="Keyword 3"></wa-input>
                <wa-input name="keyword4" label="Keyword 4"></wa-input>
                <wa-input name="keyword5" label="Keyword 5"></wa-input>
            </div>

            <div th:id="${formIdPrefix + 'AiDescriptionResult'}"
                 class="ai-description-result-panel">
                <p class="ai-generator-message">Your generated preview will appear here.</p>
            </div>

            <div class="ai-description-dialog-actions">
                <wa-button type="submit" variant="brand">
                    Generate
                </wa-button>
                <wa-button type="button"
                           variant="success"
                           th:id="${formIdPrefix + 'UseGeneratedDescriptionBtn'}">
                    Use this description
                </wa-button>
                <wa-button type="button"
                           variant="neutral"
                           th:id="${formIdPrefix + 'CancelAiDescriptionDialogBtn'}">
                    Cancel
                </wa-button>
            </div>
        </form>
    </dialog>

    <script th:inline="javascript">
        (() => {
            const prefix = /*[[${formIdPrefix}]]*/ 'productForm';
            const dialog = document.getElementById(`${prefix}AiDescriptionDialog`);
            const openBtn = document.getElementById(`${prefix}OpenAiDescriptionDialogBtn`);
            const closeBtn = document.getElementById(`${prefix}CloseAiDescriptionDialogBtn`);
            const cancelBtn = document.getElementById(`${prefix}CancelAiDescriptionDialogBtn`);
            const useBtn = document.getElementById(`${prefix}UseGeneratedDescriptionBtn`);
            const descriptionField = document.getElementById(`${prefix}DescriptionField`);

            if (!dialog || !openBtn || !closeBtn || !cancelBtn || !useBtn || !descriptionField) {
                return;
            }

            const closeDialog = () => {
                if (typeof dialog.close === 'function') {
                    dialog.close();
                } else {
                    dialog.removeAttribute('open');
                }
            };

            openBtn.addEventListener('click', () => {
                if (typeof dialog.showModal === 'function') {
                    dialog.showModal();
                } else {
                    dialog.setAttribute('open', 'open');
                }
            });

            closeBtn.addEventListener('click', closeDialog);
            cancelBtn.addEventListener('click', closeDialog);

            useBtn.addEventListener('click', () => {
                const preview = dialog.querySelector('#generatedDescriptionPreview');
                if (!preview) {
                    return;
                }

                descriptionField.value = preview.textContent.trim();
                descriptionField.dispatchEvent(new Event('input', { bubbles: true }));
                descriptionField.dispatchEvent(new Event('change', { bubbles: true }));
                closeDialog();
            });
        })();
    </script>

</div>
