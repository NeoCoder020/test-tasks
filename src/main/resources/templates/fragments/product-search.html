<div th:fragment="product-search-fragment" class="product-search-page">
    <wa-card class="product-search-card">
        <div class="product-search-header">
            <div>
                <h2 th:text="#{product.search.title}"></h2>
                <p th:text="#{product.search.subtitle}"></p>
            </div>
            <wa-badge variant="brand" th:text="#{product.search.liveBadge}"></wa-badge>
        </div>

        <form class="product-search-form"
              hx-get="/products/search"
              hx-target="#searchResults"
              hx-swap="innerHTML"
              hx-trigger="keyup changed delay:300ms from:#productSearchInput, search"
              hx-include="#productSearchInput">
            <wa-input id="productSearchInput"
                      name="q"
                      clearable
                      th:attr="label=#{form.searchByTitle},placeholder=#{form.searchPlaceholder},value=${searchQuery}">
            </wa-input>
        </form>
    </wa-card>

    <div id="searchResults" class="product-search-results">
        <div th:replace="~{fragments/products-table :: products-table-fragment}"></div>
    </div>
</div>
