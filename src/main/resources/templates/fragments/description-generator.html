<div th:fragment="description-generator-result">
    <div class="ai-generator-result">
        <div th:if="${generationError}" class="ai-generator-message ai-generator-message-error" th:text="${generationError}"></div>

        <div th:if="${generatedDescription}" class="ai-generator-preview-card">
            <div class="ai-generator-preview-header">
                <h3 th:text="#{generator.preview}"></h3>
                <wa-badge variant="brand" th:text="#{generator.aiDraft}"></wa-badge>
            </div>

            <p class="ai-generator-preview-text"
               id="generatedDescriptionPreview"
               th:text="${generatedDescription}"></p>

            <p class="ai-generator-keywords" th:text="#{generator.basedOn(${#strings.listJoin(keywords, ', ')})}"></p>
        </div>
    </div>
</div>
