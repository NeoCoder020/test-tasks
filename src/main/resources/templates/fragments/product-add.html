<div th:fragment="product-add-fragment" class="create-product-page">

    <wa-card class="add-product-card">
        <form hx-post="/product/add"
              hx-target="#content"
              hx-swap="outerHTML"
              class="add-product-form">

            <div class="product-context-field">
                <label class="product-context-label" for="selectedProductId">Product</label>

                <div class="product-context-value" th:if="${selectedProduct != null}">
                    <span class="product-context-title" th:text="${selectedProduct.title}">Selected Product</span>
                </div>

                <div class="product-selector-field" th:if="${selectedProduct == null}">

                    <wa-button id="productTrigger" variant="neutral" type="button">
                        Select Product
                    </wa-button>
                    <wa-dialog label="Select Product" id="productSelectDialog">
                        <div class="product-dialog-list">
                            <div class="product-option"
                                 th:each="product : ${products}"
                                 th:attr="data-id=${product.id},data-title=${product.title}">
                                <img th:src="${product.imageUrl}" alt="">
                                <div class="product-option-info">
                                    <div class="product-option-title" th:text="${product.title}"></div>
                                    <div class="product-option-type" th:text="${product.type}"></div>
                                </div>
                            </div>
                        </div>
                        <wa-button slot="footer"
                                   variant="neutral"
                                   type="button"
                                   id="closeProductDialogBtn">
                            Close
                        </wa-button>
                    </wa-dialog>
                </div>
            </div>

            <input type="hidden"
                   name="productId"
                   id="selectedProductId"
                   th:value="${selectedProductId}"
                   required>

            <wa-input name="title" label="Title" required></wa-input>
            <wa-input name="position" label="Position" type="number"></wa-input>
            <wa-input name="price" label="Price" type="number"></wa-input>

            <div class="add-product-actions">
                <wa-button type="submit" variant="brand">
                    Create
                </wa-button>
            </div>

        </form>
    </wa-card>

    <script th:inline="javascript">
        (() => {
            const root = document.currentScript.closest('[th\\:fragment], div');
            const hiddenInput = root.querySelector('#selectedProductId');
            const trigger = root.querySelector('#productTrigger');
            const dialog = root.querySelector('#productSelectDialog');
            const closeDialogBtn = root.querySelector('#closeProductDialogBtn');
            const selectedProductId = /*[[${selectedProductId}]]*/ null;

            if (!trigger || !hiddenInput || !dialog) {
                return;
            }

            trigger.addEventListener('click', () => {
                if (typeof dialog.show === 'function') {
                    dialog.show();
                } else {
                    dialog.setAttribute('open', '');
                }
            });

            if (closeDialogBtn) {
                closeDialogBtn.addEventListener('click', () => {
                    if (typeof dialog.hide === 'function') {
                        dialog.hide();
                    } else {
                        dialog.removeAttribute('open');
                    }
                });
            }


            function selectOption(option) {
                const id = option.dataset.id;
                const title = option.dataset.title;

                hiddenInput.value = id;
                trigger.textContent = title;

                root.querySelectorAll('.product-option').forEach(item => {
                    item.classList.remove('selected-product-option');
                });

                option.classList.add('selected-product-option');
            }

            root.querySelectorAll('.product-option').forEach(option => {
                option.addEventListener('click', () => {
                    selectOption(option);

                    if (typeof dialog.hide === 'function') {
                        dialog.hide();
                    } else {
                        dialog.removeAttribute('open');
                    }
                });
            });

            if (selectedProductId !== null) {
                const defaultOption = root.querySelector(`.product-option[data-id="${selectedProductId}"]`);
                if (defaultOption) {
                    selectOption(defaultOption);
                }
            }
        })();
    </script>

</div>
