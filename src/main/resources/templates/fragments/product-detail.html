<div th:fragment="product-detail-fragment">

    <div class="product-detail-page">

        <wa-card class="product-detail-card detail-animate">
            <div class="product-detail-image-wrapper image-animate">
                <img class="product-detail-image"
                     th:src="${product.imageUrl}"
                     th:alt="${product.title}">
            </div>

            <div class="product-detail-content content-animate">
                <h2 th:text="${product.title}"></h2>

                <wa-badge variant="neutral" th:text="${product.type}"></wa-badge>

                <div class="product-description"
                     th:utext="${product.description}"></div>

                <div class="product-detail-actions">
                    <wa-button variant="brand"
                               onclick="document.getElementById('variants-dialog').show()"
                               th:text="#{button.showVariants}"></wa-button>

                    <wa-button variant="neutral"
                               hx-get="/products"
                               hx-target="#content"
                               hx-swap="innerHTML"
                               hx-push-url="true"
                               th:text="#{button.backToProducts}"></wa-button>
                </div>
            </div>
        </wa-card>
    </div>

    <wa-dialog th:attr="label=#{dialog.productVariants}" id="variants-dialog" class="dialog-animate">
        <div class="variants-dialog-content">
            <h3 th:text="#{dialog.variantsOf(${product.title})}"></h3>
            <div class="variants-table-wrapper">
                <table class="variants-table">
                    <thead>
                    <tr>
                        <th th:text="#{table.title}"></th>
                        <th th:text="#{table.price}"></th>
                        <th th:text="#{table.position}"></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="variant : ${variants}">
                        <td th:text="${variant.title}"></td>
                        <td th:text="${variant.price}"></td>
                        <td th:text="${variant.position}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <wa-button slot="footer"
                   variant="neutral"
                   type="button"
                   id="closeVariantsDialogBtn"
                   th:text="#{button.close}"></wa-button>
    </wa-dialog>

    <script>
        (() => {
            const dialog = document.getElementById('variants-dialog');
            const closeBtn = document.getElementById('closeVariantsDialogBtn');

            if (!dialog || !closeBtn) {
                return;
            }

            closeBtn.addEventListener('click', () => {
                if (typeof dialog.hide === 'function') {
                    dialog.hide();
                } else {
                    dialog.removeAttribute('open');
                }
            });
        })();
    </script>

</div>
